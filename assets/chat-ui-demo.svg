  <text x="432" y="356" fill="#5E4B2F" font-family="Verdana" font-size="20">LoRA keeps the base model fixed and learns a lightweight adapter.</text>
  <text x="432" y="388" fill="#5E4B2F" font-family="Verdana" font-size="20">That makes it a good fit for tone shifts, because you can preserve general</text>
